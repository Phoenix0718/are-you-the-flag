<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Track Your Responses</title>
    <script>
        // Function to track responses using localStorage
        function trackResponse(response) {
            let responses = JSON.parse(localStorage.getItem('responses')) || [];
            responses.push(response);
            localStorage.setItem('responses', JSON.stringify(responses));
        }

        // Function to export responses
        function exportResponses() {
            const responses = localStorage.getItem('responses') || '[]';
            const blob = new Blob([responses], { type: 'application/json' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'responses.json';
            link.click();
        }
    </script>
</head>
<body>
    <h1>Response Tracking</h1>
    <button onclick="exportResponses()">Export Responses</button>
    <script>
        // Example usage of tracking a response
        trackResponse('User response example');
    </script>
</body>
</html>
