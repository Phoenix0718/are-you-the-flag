<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Are You the Flag?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    .hidden {
      display: none;
    }

    .progress {
      height: 10px;
      background: #334155;
      border-radius: 5px;
      margin-top: 10px;
    }

    .progress-bar {
      height: 10px;
      background: #22c55e;
      border-radius: 5px;
      width: 0%;
    }

    .disclaimer {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 30px;
      padding: 15px;
      background: #1e293b;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚦 Are You the Flag?</h1>
    <p>Be honest. No one's watching 👀</p>

    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <div id="quiz" class="card"></div>
    <div id="result" class="card hidden"></div>

    <p class="disclaimer">
      Disclaimer: This is for self-reflection, not professional advice.
    </p>
  </div>

  <script>
    const questions = [
      {
        q: "Do you get upset when someone doesn't reply quickly?",
        options: [
          { text: "No, I understand people are busy", score: 2 },
          { text: "Sometimes, depends", score: 1 },
          { text: "Yes, I overthink immediately", score: 0 }
        ]
      },
      {
        q: "Do you respect 'no' without pushing?",
        options: [
          { text: "Always", score: 2 },
          { text: "I try but sometimes push", score: 1 },
          { text: "I usually try to convince them", score: 0 }
        ]
      },
      {
        q: "Do you feel the need to check their phone?",
        options: [
          { text: "Never", score: 2 },
          { text: "Only if something feels off", score: 1 },
          { text: "Yes, I need reassurance", score: 0 }
        ]
      },
      {
        q: "When they ask for space, you:",
        options: [
          { text: "Respect it", score: 2 },
          { text: "Feel anxious but give space", score: 1 },
          { text: "Keep texting anyway", score: 0 }
        ]
      }
    ];

    let current = 0;
    let score = 0;

    const quizDiv = document.getElementById("quiz");
    const resultDiv = document.getElementById("result");
    const progressBar = document.getElementById("progressBar");

    function loadQuestion() {
      const q = questions[current];

      progressBar.style.width = ((current / questions.length) * 100) + "%";

      quizDiv.innerHTML = `
        <h2>${q.q}</h2>
        ${q.options.map((opt, i) =>
          `<button onclick="selectOption(${opt.score})">${opt.text}</button>`
        ).join("")}
      `;
    }

    function selectOption(points) {
      score += points;
      current++;

      if (current < questions.length) {
        loadQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      quizDiv.classList.add("hidden");
      resultDiv.classList.remove("hidden");

      let message = "";
      let emoji = "";

      if (score >= 7) {
        emoji = "🟢";
        message = "You're emotionally aware & respect boundaries. Green flag energy.";
      } else if (score >= 4) {
        emoji = "🟡";
        message = "You're growing. Some patterns to reflect on, but you're getting there.";
      } else {
        emoji = "🔥";
        message = "Time for reflection. Growth starts with awareness, not shame.";
      }

      resultDiv.innerHTML = `
        <h2>${emoji} Your Result</h2>
        <p>${message}</p>
        <p>Score: ${score}</p>
        <button onclick="location.reload()">Play Again</button>
      `;
    }

    loadQuestion();
  </script>
</body>
</html>
